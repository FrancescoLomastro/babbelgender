name: babbelgender
description: "Practice German noun genders with your Babbel vocabulary."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # File picking
  file_picker: ^8.1.2

  # Persistent settings
  shared_preferences: ^2.3.2

  # Sound effects
  audioplayers: ^6.1.0

  # Animations
  flutter_animate: ^4.5.0

  # Splash screen
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# ── App icon (flutter_launcher_icons) ─────────────────────────────────────────
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: "assets/logo.png"

# ── Splash screen (flutter_native_splash) ─────────────────────────────────────
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/logo.png
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/logo.png
